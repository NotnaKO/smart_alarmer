name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Run Lint Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6  

      - name: Run Lint
        run: ./gradlew ktlintCheck lintDebug

      - name: Upload Lint Report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lint-results-debug
          path: app/build/reports/lint-results-debug.html

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6  

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Upload Test Report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: app/build/reports/tests/testDebugUnitTest/

  instrumented-test:
    name: Run Instrumented Tests (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        api-level: [26, 31, 34, 36]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          disable-animations: true
          script: |
            ./gradlew installDebug
            if [ "${{ matrix.api-level }}" = "31" ]; then adb shell appops set com.notnako.smartalarmer SCHEDULE_EXACT_ALARM allow; fi
            if [ "${{ matrix.api-level }}" -ge "33" ]; then adb shell pm grant com.notnako.smartalarmer android.permission.POST_NOTIFICATIONS; fi
            ./gradlew connectedAndroidTest -Pandroid.testInstrumentationRunnerArguments.sleepDevice=true

      - name: Upload Instrumented Test Reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-test-reports-api-${{ matrix.api-level }}
          path: app/build/reports/androidTests/connected/

  build:
    name: Build Debug APK
    if: github.event_name == 'push'
    needs: [lint, test, instrumented-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6  

      - name: Build Debug APK
        run: ./gradlew assembleDebug -x connectedAndroidTest --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
