version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    groups:
      androidx:
        patterns:
          - "androidx.*"
      kotlin-build:
        patterns:
          - "org.jetbrains.kotlin*"
          - "com.google.devtools.ksp*"
          - "com.android.*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
